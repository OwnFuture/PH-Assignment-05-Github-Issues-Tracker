<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Isuues Home</title>

    <!--Font awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--Daisy UI and Tailwind CSS-->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--Google Font-->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!--Stylesheet-->
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <!--Navbar section-->

    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl"><img src="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" alt="" class="w-6 h-6"> Github Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <input  type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New issue</button>
            </div>
</div>
    </header>

    <!--Button group section-->

    <section class="mt-[40px] w-[80%] mx-auto bg-gray-100 p-3 rounded-xl shadow-sm flex gap-3">
        <button class="btn btn-primary">All</button>
         <button class="btn">Open</button>
          <button class="btn">Closed</button>
    </section>

    <!--open and closed section-->

    <section class="mt-[20px] w-[80%] mx-auto bg-gray-100 shadow-sm rounded-xl p-3 flex justify-between items-center">
        <div class="left flex justify-center items-center gap-3">
            <div><img src="./B13-A5-Github-Issue-Tracker/assets/Aperture.png" alt=""></div>
            <div>
                <p class="text-[18px] font-bold"><span id="issue-count">0</span> Issues</p>
                <p class="text-[14px]">Track and manage your project issues</p>
            </div>
        </div>
        <div class="right flex justify-center items-center gap-3">
            <div class="flex items-center gap-2">
                <span class="h-3 w-3 rounded-full bg-green-500"></span>
                <span>Open</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="h-3 w-3 rounded-full bg-purple-500"></span>
                <span>Closed</span>
            </div>
        </div>
    </section>
</body>
</html>
